name: CI-CD Pipeline

on:
  push:
    branches:
     - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Authenticate to login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/<GeorgiaSeinti>/echo-api:latest .
      
      - name: Push Image to GHCR 
        run: |
          docker push ghcr.io/<GeorgiaSeinti>/echo-api:latest
