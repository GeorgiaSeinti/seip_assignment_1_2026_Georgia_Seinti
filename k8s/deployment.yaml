apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-api-Deployment

spec:

  replicas: 3

  selector:
    matchLabels:
      app: echo-api
  
  template:
    metadata:
      labels:
        app: echo-api
    
    spec:

      containers:
        - name: echo-api

          image: ghcr.io/georgiaseinti/echo-api:latest

          ports:
            - containerPort : 3000
      
          resources:
            requests:
              cpu: "100m"
              memory: "128mi"

            limits:
              cpu: "250m"
              memory: "256mi"

          env:
            - name: WELCOME_MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: echo-api-config
                  key: WELCOME_MESSAGE

            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: echo-api-config
                  key: NODE_ENV

            - name: API_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: echo-api-secret
                  key: API_SECRET_KEY

          livenessProbe:
            httpGet:
              path: /health
              port: 3000

          readinessProbe:
            httpGet:
              path: /health
              port: 3000      
